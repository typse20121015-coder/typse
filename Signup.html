<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公會活動報名系統</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* 自定義按鈕樣式，確保跨瀏覽器一致性 */
        .btn-icon { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        //  設定區域
        // ==========================================
        
        // ★★★ 請將下方的引號內容替換成您部署後的「網頁應用程式網址」 ★★★
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwFUqbvwnrNgR2n8Bwznkp_NglyDZUSF8z6UOAr6N64gLMvt49OR75qXNU-d2qpc9de/exec";
        
        // ==========================================

        const { useState, useEffect } = React;

        // --- 優化後的圖示元件 ---
        const IconBase = ({ children, className, ...props }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round"
                className={`flex-shrink-0 ${className || 'w-5 h-5'}`} 
                {...props}
            >
                {children}
            </svg>
        );

        const Icons = {
            Users: (props) => <IconBase {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconBase>,
            UserPlus: (props) => <IconBase {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></IconBase>,
            Lock: (props) => <IconBase {...props}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></IconBase>,
            Trash2: (props) => <IconBase {...props}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconBase>,
            Save: (props) => <IconBase {...props}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></IconBase>,
            CheckCircle: (props) => <IconBase {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconBase>,
            Download: (props) => <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></IconBase>,
            LogOut: (props) => <IconBase {...props}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></IconBase>,
            Edit: (props) => <IconBase {...props}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></IconBase>,
            X: (props) => <IconBase {...props}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconBase>,
            MapPin: (props) => <IconBase {...props}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></IconBase>,
            TrendingUp: (props) => <IconBase {...props}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></IconBase>
        };

        const Header = ({ setView, view }) => (
            <header className="bg-indigo-700 text-white shadow-lg sticky top-0 z-50">
                <div className="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('form')}>
                        <Icons.Users className="w-6 h-6" />
                        <h1 className="text-lg md:text-xl font-bold tracking-wider truncate">公會活動報名系統</h1>
                    </div>
                    <nav className="flex gap-2">
                        <button onClick={() => setView('form')} className={`btn-icon text-xs md:text-sm px-3 py-2 rounded-md transition gap-2 whitespace-nowrap active:scale-95 ${view==='form' ? 'bg-indigo-900' : 'bg-indigo-800 hover:bg-indigo-900'}`}>
                            <Icons.UserPlus className="w-4 h-4" /> 報名
                        </button>
                        <button onClick={() => setView('admin')} className={`btn-icon text-xs md:text-sm px-3 py-2 rounded-md transition gap-2 whitespace-nowrap active:scale-95 ${view==='admin' ? 'bg-indigo-900' : 'bg-indigo-800 hover:bg-indigo-900'}`}>
                            <Icons.Lock className="w-4 h-4" /> 管理
                        </button>
                    </nav>
                </div>
            </header>
        );

        // --- 講座地點與停車資訊彈窗元件 ---
        const ParkingModal = ({ onClose }) => (
            <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4 backdrop-blur-sm animate-fade-in">
                <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all scale-100">
                    <div className="p-4 bg-indigo-700 flex justify-between items-center text-white">
                        <h3 className="text-lg font-bold flex items-center gap-2">
                            <Icons.MapPin className="w-5 h-5" /> 停車資訊
                        </h3>
                        <button onClick={onClose} className="hover:bg-indigo-800 p-1 rounded-full transition">
                            <Icons.X className="w-5 h-5" />
                        </button>
                    </div>
                    <div className="p-5 space-y-4 text-gray-700 bg-gray-50">
                        {/* 停車資訊 1 */}
                        <div className="bg-white p-4 rounded-lg shadow-sm border border-gray-100">
                            <div className="flex items-center gap-2 mb-3 pb-2 border-b border-gray-100">
                                <span className="bg-indigo-100 text-indigo-700 font-bold rounded-full w-6 h-6 flex items-center justify-center flex-shrink-0 text-sm">1</span>
                                <h4 className="font-bold text-lg text-gray-900">潮之汕沙鍋粥旁停車場</h4>
                            </div>
                            <div className="ml-8 space-y-3">
                                <p className="text-sm text-gray-500 flex items-start gap-1">
                                    <span className="flex-shrink-0 mt-0.5 text-gray-400">📍</span>
                                    桃園區三民路三段150號旁邊
                                </p>
                                <div className="text-sm bg-green-50 text-black p-2.5 rounded-md border border-green-100 font-medium flex items-start gap-2">
                                    <span className="flex-shrink-0">🎟️</span>
                                    向管理員領取停車劵，至公會將停車劵給予公會蓋章，即可免費停車。
                                </div>
                            </div>
                        </div>

                        {/* 停車資訊 2 */}
                        <div className="bg-white p-4 rounded-lg shadow-sm border border-gray-100">
                            <div className="flex items-center gap-2 mb-3 pb-2 border-b border-gray-100">
                                <span className="bg-indigo-100 text-indigo-700 font-bold rounded-full w-6 h-6 flex items-center justify-center flex-shrink-0 text-sm">2</span>
                                <h4 className="font-bold text-lg text-gray-900">南門停車場</h4>
                            </div>
                            <div className="ml-8 space-y-3">
                                <p className="text-sm text-gray-500 flex items-start gap-1">
                                    <span className="flex-shrink-0 mt-0.5 text-gray-400">📍</span>
                                    桃園區三民路三段260號
                                </p>
                                <div className="text-sm bg-green-50 text-black p-2.5 rounded-md border border-green-100 font-medium">
                                    <div className="flex items-start gap-2">
                                        <span className="flex-shrink-0">🎟️</span>
                                        <div>
                                            停車費用至公會領取停車劵，抵扣停車費。
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div className="p-4 bg-white border-t flex justify-center">
                        <button onClick={onClose} className="bg-indigo-700 text-white px-8 py-2 rounded-lg hover:bg-indigo-800 transition shadow-sm font-medium">了解</button>
                    </div>
                </div>
            </div>
        );

        // --- 編輯彈窗元件 ---
        const EditModal = ({ data, onClose, onSave }) => {
            const [name, setName] = useState(data.memberName || '');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!name.trim()) return alert("姓名不可為空");
                onSave({ ...data, memberName: name });
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden">
                        <div className="p-4 bg-indigo-600 flex justify-between items-center text-white">
                            <h3 className="text-lg font-bold">編輯會員資料</h3>
                            <button onClick={onClose} className="hover:bg-indigo-700 p-1 rounded-full"><Icons.X className="w-5 h-5" /></button>
                        </div>
                        <form onSubmit={handleSubmit} className="p-5 space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">會員姓名</label>
                                <input type="text" value={name} onChange={(e) => setName(e.target.value)} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" required />
                            </div>
                            <div className="flex gap-3 pt-2">
                                <button type="button" onClick={onClose} className="flex-1 bg-gray-100 text-gray-700 py-2.5 rounded-lg hover:bg-gray-200">取消</button>
                                <button type="submit" className="flex-1 bg-indigo-600 text-white py-2.5 rounded-lg hover:bg-indigo-700">儲存</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const RegistrationForm = ({ onSubmit, isSubmitting }) => {
            const [formData, setFormData] = useState({ memberName: '' });
            const [showSuccess, setShowSuccess] = useState(false);

            const handleMemberChange = (e) => setFormData({ memberName: e.target.value });

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.memberName || formData.memberName.trim() === '') return alert("請輸入會員姓名");
                
                const success = await onSubmit(formData);
                if (success) setShowSuccess(true);
            };

            if (showSuccess) return (
                <div className="flex flex-col items-center justify-center p-8 bg-white rounded-xl shadow-lg mt-6 text-center animate-fade-in mx-4">
                    <Icons.CheckCircle className="w-20 h-20 text-green-500 mb-4" />
                    <h2 className="text-2xl font-bold text-gray-800 mb-2">報名成功！</h2>
                    <p className="text-gray-600 mb-6">您的報名資料已成功傳送。</p>
                    <div className="bg-gray-50 p-4 rounded-lg border border-gray-200 text-sm text-gray-500 w-full">感謝您的參與，講座相關資訊將於活動前另行通知。</div>
                </div>
            );

            return (
                <form onSubmit={handleSubmit} className="bg-white rounded-xl shadow-lg p-6 md:p-8 mt-4 md:mt-0 mx-2 md:mx-0">
                    <h2 className="text-xl font-bold text-gray-800 mb-6 border-b pb-3 flex items-center gap-2">
                        <Icons.UserPlus className="text-indigo-600 w-6 h-6" /> 填寫報名資料
                    </h2>
                    
                    <div className="mb-8">
                        <p className="text-sm text-gray-600 mb-4">為方便現場報到作業，請填寫您的真實姓名。</p>
                        <div className="p-5 border border-gray-200 rounded-xl bg-gray-50 hover:bg-white hover:shadow-sm transition-all">
                            <label className="block text-sm font-medium text-gray-700 mb-2">會員姓名 <span className="text-red-500">*</span></label>
                            <input 
                                required 
                                type="text" 
                                name="memberName" 
                                value={formData.memberName} 
                                onChange={handleMemberChange} 
                                placeholder="請輸入真實姓名" 
                                className="w-full p-4 border border-gray-300 rounded-lg text-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" 
                            />
                        </div>
                    </div>
                    
                    <button type="submit" disabled={isSubmitting} className={`btn-icon w-full py-4 px-6 rounded-xl font-bold text-lg text-white shadow-lg transition transform hover:-translate-y-0.5 active:translate-y-0 gap-2 ${isSubmitting ? 'bg-gray-400 cursor-not-allowed' : 'bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800'}`}>
                        {isSubmitting ? '資料上傳中...' : <><Icons.Save className="w-6 h-6" /> 確認送出報名</>}
                    </button>
                </form>
            );
        };

        const AdminLogin = ({ onLogin }) => {
            const [password, setPassword] = useState('');
            const [error, setError] = useState(false);
            const handleSubmit = (e) => {
                e.preventDefault();
                if (password === 'admin888') onLogin(true);
                else setError(true);
            };
            return (
                <div className="max-w-md mx-auto mt-10 bg-white p-8 rounded-xl shadow-lg border-t-4 border-indigo-700 mx-4">
                    <div className="text-center mb-6">
                        <div className="bg-indigo-50 p-3 rounded-full w-16 h-16 flex items-center justify-center mx-auto mb-4 text-indigo-700"><Icons.Lock className="w-8 h-8" /></div>
                        <h2 className="text-xl font-bold text-gray-800">管理員登入</h2>
                        <p className="text-sm text-gray-500 mt-2">請輸入管理密碼</p>
                    </div>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <input type="password" placeholder="請輸入密碼" className="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition text-lg" value={password} onChange={(e) => { setPassword(e.target.value); setError(false); }} />
                        {error && <p className="text-red-500 text-sm text-center">密碼錯誤，請重試。</p>}
                        <button className="w-full bg-indigo-700 text-white py-3 rounded-lg font-bold hover:bg-indigo-800 transition shadow text-lg">登入後台</button>
                    </form>
                </div>
            );
        };

        const AdminDashboard = ({ registrations, onLogout, onAction }) => {
            const [editingDoc, setEditingDoc] = useState(null);
            const totalMembers = registrations.length;

            const exportToCSV = () => {
                let csvContent = "\uFEFF報名時間,會員姓名\n";
                registrations.forEach(reg => {
                    const date = new Date(reg.timestamp).toLocaleString();
                    csvContent += `"${date}","${reg.memberName}"\n`;
                });
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `講座報名清單_${new Date().toISOString().slice(0,10)}.csv`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const handleDelete = (id, name) => {
                if (confirm(`確定要刪除 ${name} 的報名資料嗎？`)) {
                    onAction('delete', { userId: id });
                }
            };

            const handleUpdate = (updatedData) => {
                onAction('update', updatedData);
                setEditingDoc(null);
            };

            const adminBtnClass = "btn-icon flex-1 md:flex-none justify-center px-4 py-2.5 rounded-lg shadow-sm text-sm whitespace-nowrap gap-2 border";

            return (
                <div className="mt-2 md:mt-6">
                    <div className="flex flex-col gap-4 bg-white p-4 rounded-xl shadow-sm border border-gray-100 mx-2 md:mx-0">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div>
                                <h2 className="text-xl md:text-2xl font-bold text-gray-800 flex items-center gap-2"><Icons.Users className="w-6 h-6 text-indigo-700" /> 報名管理</h2>
                                <div className="flex gap-3 mt-2 text-sm text-gray-500 bg-gray-50 p-2 rounded-lg">
                                    <span>目前報名人數: <b className="text-indigo-700 text-lg">{totalMembers}</b> 人</span>
                                </div>
                            </div>
                            <div className="flex flex-wrap gap-2 w-full md:w-auto">
                                <button onClick={exportToCSV} className={`${adminBtnClass} bg-green-600 hover:bg-green-700 text-white border-green-700`}><Icons.Download className="w-4 h-4" /> 匯出清單</button>
                                <button onClick={onLogout} className={`${adminBtnClass} bg-gray-100 hover:bg-gray-200 text-gray-700 border-gray-200`}><Icons.LogOut className="w-4 h-4" /> 登出</button>
                            </div>
                        </div>
                    </div>
                    
                    <div className="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200 mt-4 mx-2 md:mx-0">
                        <div className="overflow-x-auto">
                            <table className="min-w-full divide-y divide-gray-200">
                                <thead className="bg-gray-50">
                                    <tr>
                                        <th className="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider w-24">操作</th>
                                        <th className="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">會員姓名</th>
                                        <th className="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">報名時間</th>
                                    </tr>
                                </thead>
                                <tbody className="bg-white divide-y divide-gray-200">
                                    {registrations.length === 0 ? 
                                        <tr><td colSpan="3" className="text-center py-8 text-gray-400">讀取中或目前無人報名...</td></tr> :
                                        registrations.map((reg, idx) => (
                                        <tr key={idx} className="hover:bg-indigo-50/30 transition-colors">
                                            <td className="px-6 py-4 whitespace-nowrap">
                                                <div className="flex gap-2">
                                                    <button onClick={() => setEditingDoc(reg)} className="btn-icon text-indigo-600 p-2 bg-indigo-50 rounded-lg hover:bg-indigo-100 transition-colors" title="編輯"><Icons.Edit className="w-4 h-4" /></button>
                                                    <button onClick={() => handleDelete(reg.userId, reg.memberName)} className="btn-icon text-red-500 p-2 bg-red-50 rounded-lg hover:bg-red-100 transition-colors" title="刪除"><Icons.Trash2 className="w-4 h-4" /></button>
                                                </div>
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap">
                                                <div className="font-bold text-gray-900 text-base">{reg.memberName}</div>
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                                {new Date(reg.timestamp).toLocaleString('zh-TW', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    {editingDoc && <EditModal data={editingDoc} onClose={() => setEditingDoc(null)} onSave={handleUpdate} />}
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('form');
            const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);
            const [registrations, setRegistrations] = useState([]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [refreshKey, setRefreshKey] = useState(0);
            const [showParkingInfo, setShowParkingInfo] = useState(false);

            // 讀取 Google Sheets 資料
            useEffect(() => {
                if (view === 'admin' && isAdminLoggedIn) {
                    if(GOOGLE_SCRIPT_URL.includes("請將這裡")) return;
                    fetch(GOOGLE_SCRIPT_URL)
                        .then(res => res.json())
                        .then(data => setRegistrations(data.reverse()))
                        .catch(err => console.error("Error fetching data:", err));
                }
            }, [view, isAdminLoggedIn, refreshKey]);

            // 處理一般報名
            const handleSubmission = async (formData) => {
                return await sendToGAS({ ...formData, action: 'add', userId: 'user_' + Date.now() + Math.random().toString(36).substr(2, 9) });
            };

            // 處理管理員動作 (刪除/修改)
            const handleAdminAction = async (action, data) => {
                const success = await sendToGAS({ ...data, action: action });
                if (success) {
                    alert(action === 'delete' ? '刪除成功' : '修改成功');
                    setRefreshKey(prev => prev + 1); // 觸發重新讀取資料
                }
            };

            const sendToGAS = async (payload) => {
                if(GOOGLE_SCRIPT_URL.includes("請將這裡")) {
                    alert("請先設定 Google Apps Script 網址！");
                    return false;
                }
                setIsSubmitting(true);
                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload),
                        headers: { "Content-Type": "text/plain;charset=utf-8" },
                    });
                    setIsSubmitting(false); return true;
                } catch (e) { 
                    console.error(e); 
                    alert("連線失敗，請檢查網路"); 
                    setIsSubmitting(false); return false; 
                }
            };

            return (
                <div className="flex-grow">
                    <Header setView={setView} view={view} />
                    <main className="max-w-4xl mx-auto w-full px-0 md:px-4 pb-10">
                        {view === 'form' && (
                            <>
                                <div className="mt-4 md:mt-6 px-4">
                                    <h2 className="text-2xl md:text-3xl font-extrabold text-gray-800 text-center mb-4">桃園市結構工程技師公會</h2>
                                    
                                    {/* 替換為理財講座主視覺圖片 */}
                                    <div className="relative rounded-xl shadow-md mb-4 overflow-hidden bg-gray-100">
                                        <img src="money.jpg" alt="理財講座 樂享生活不愁錢" className="w-full h-auto object-contain" style={{maxHeight: '400px'}} 
                                            onError={(e) => {
                                                e.target.onerror = null;
                                                e.target.style.display = 'none';
                                                e.target.nextSibling.style.display = 'flex';
                                            }}
                                        />
                                        {/* 圖片載入失敗時的預設背景 */}
                                        <div className="absolute inset-0 flex-col items-center justify-center text-white hidden p-6 text-center bg-indigo-900">
                                            <Icons.TrendingUp className="w-16 h-16 mb-4 text-indigo-300" />
                                            <h3 className="text-2xl font-bold mb-2">樂享生活不愁錢：從現在開始的退休財務藍圖</h3>
                                            <p className="text-indigo-200">2026 財富管理與投資策略講座</p>
                                        </div>
                                    </div>

                                    <div className="flex flex-col md:flex-row items-center justify-center gap-3 mb-4">
                                        <div className="text-center text-gray-700 text-sm md:text-base font-medium">
                                            地點：桃園市桃園區三民路三段180號4樓之2<br/>
                                            (桃園市結構工程技師公會 會議室)
                                        </div>
                                        <button onClick={() => setShowParkingInfo(true)} className="text-xs bg-indigo-600 text-white px-5 py-2 rounded-full hover:bg-indigo-700 transition flex items-center gap-1 shadow-md whitespace-nowrap mt-2 md:mt-0">
                                            <Icons.MapPin className="w-4 h-4" /> 停車資訊
                                        </button>
                                    </div>
                                </div>
                                <RegistrationForm onSubmit={handleSubmission} isSubmitting={isSubmitting} />
                            </>
                        )}
                        {showParkingInfo && <ParkingModal onClose={() => setShowParkingInfo(false)} />}
                        {view === 'admin' && (!isAdminLoggedIn ? <AdminLogin onLogin={setIsAdminLoggedIn} /> : <AdminDashboard registrations={registrations} onLogout={() => setIsAdminLoggedIn(false)} onAction={handleAdminAction} />)}
                    </main>
                    <footer className="mt-auto py-6 text-center text-gray-400 text-sm bg-gray-100 border-t border-gray-200">&copy; 2026 桃園市結構工程技師公會 by 曉芬</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
