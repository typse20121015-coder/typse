<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公會活動意願調查系統 - 紐西蘭參訪</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-icon { display: flex; align-items: center; justify-content: center; }
        .custom-checkbox { width: 1.25rem; height: 1.25rem; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col font-sans">

    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        //  設定區域
        // ==========================================
        
        // ★★★ 1. Google Apps Script 網址 (已更新為最新 ID) ★★★
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby-gsYXclOvrjzfOSTan4CXqvli8vYxEZwZdk4jHlV3OzvbqVvLZRVYrV16DxC4dNve/exec";
        
        // ★★★ 2. 圖片與 PDF 網址設定 ★★★
        const ITINERARY_IMAGES = ["01.jpg", "02.jpg", "03.jpg", "04.jpg", "05.jpg"];
        const ITINERARY_PDF_URL = "01.pdf";
        
        // ==========================================

        const { useState, useEffect } = React;

        const Icons = {
            Users: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 flex-shrink-0"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            UserPlus: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 flex-shrink-0"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>,
            Lock: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 flex-shrink-0"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
            Plus: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 flex-shrink-0"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Trash2: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 flex-shrink-0"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Send: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 flex-shrink-0"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
            CheckCircle: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 flex-shrink-0"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            Download: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 flex-shrink-0"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            LogOut: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 flex-shrink-0"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
            Edit: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 flex-shrink-0"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            X: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 flex-shrink-0"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Search: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 flex-shrink-0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            Globe: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 flex-shrink-0"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>,
            Navigation: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 flex-shrink-0"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>,
            FileText: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 flex-shrink-0"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        };

        const Header = ({ setView, view }) => (
            <header className="bg-sky-800 text-white shadow-lg sticky top-0 z-40">
                <div className="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('form')}>
                        <Icons.Globe />
                        <h1 className="text-lg md:text-xl font-bold tracking-wider truncate">紐西蘭參訪意願調查</h1>
                    </div>
                    <nav className="flex gap-2">
                        <button onClick={() => setView('form')} className={`btn-icon text-xs md:text-sm px-3 py-2 rounded-md transition gap-2 whitespace-nowrap active:scale-95 ${view==='form' ? 'bg-sky-900' : 'bg-sky-700 hover:bg-sky-900'}`}>
                            <Icons.UserPlus className="w-4 h-4" /> 填寫表單
                        </button>
                        <button onClick={() => setView('admin')} className={`btn-icon text-xs md:text-sm px-3 py-2 rounded-md transition gap-2 whitespace-nowrap active:scale-95 ${view==='admin' ? 'bg-sky-900' : 'bg-sky-700 hover:bg-sky-900'}`}>
                            <Icons.Lock className="w-4 h-4" /> 管理後台
                        </button>
                    </nav>
                </div>
            </header>
        );

        const ItineraryModal = ({ onClose }) => {
            useEffect(() => { document.body.style.overflow = 'hidden'; return () => document.body.style.overflow = 'unset'; }, []);
            return (
                <div className="fixed inset-0 z-50 flex flex-col bg-slate-900/95 fade-in backdrop-blur-sm">
                    <div className="flex justify-between items-center p-4 bg-slate-900 text-white border-b border-slate-700">
                        <h3 className="font-bold flex items-center gap-2 text-lg"><Icons.FileText className="text-sky-400" /> 行程表預覽</h3>
                        <div className="flex items-center gap-4">
                            <a href={ITINERARY_PDF_URL} target="_blank" className="bg-sky-600 hover:bg-sky-500 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2"><Icons.Download className="w-4 h-4" /> 下載 PDF</a>
                            <button onClick={onClose} className="p-2 bg-slate-800 rounded-full text-slate-300"><Icons.X className="w-6 h-6" /></button>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 md:p-8 flex flex-col items-center gap-6">
                        {ITINERARY_IMAGES.map((src, i) => (
                            <div key={i} className="relative w-full max-w-3xl">
                                <div className="absolute top-2 left-2 bg-black/60 text-white text-xs px-2 py-1 rounded">第 {i + 1} 頁</div>
                                <img src={src} className="w-full bg-white rounded-xl shadow-2xl object-contain min-h-[300px]" />
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const EditModal = ({ data, onClose, onSave }) => {
            const [formData, setFormData] = useState(JSON.parse(JSON.stringify(data)));
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-3xl max-h-[90vh] flex flex-col overflow-hidden">
                        <div className="flex justify-between items-center p-4 border-b bg-slate-50">
                            <h3 className="font-bold text-lg flex items-center gap-2 text-slate-800"><Icons.Edit className="text-sky-600" /> 編輯會員資料</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><Icons.X className="w-6 h-6" /></button>
                        </div>
                        <div className="p-4 md:p-6 overflow-y-auto flex-1">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                                <div>
                                    <label className="block text-xs font-medium text-slate-500 mb-1">會員姓名</label>
                                    <input type="text" value={formData.memberName} onChange={(e) => setFormData({...formData, memberName: e.target.value})} className="w-full p-2.5 border rounded-lg" />
                                </div>
                                <div>
                                    <label className="block text-xs font-medium text-slate-500 mb-1">參加意願</label>
                                    <select value={formData.intent} onChange={(e) => setFormData({...formData, intent: e.target.value})} className="w-full p-2.5 border rounded-lg bg-white">
                                       <option value="有意願參加">✅ 有意願參加</option>
                                       <option value="無法參加">❌ 無法參加</option>
                                    </select>
                                </div>
                                {formData.intent !== '無法參加' && (
                                    <label className="md:col-span-2 flex items-center gap-3 p-3 border rounded-lg cursor-pointer bg-slate-50">
                                        <input type="checkbox" checked={formData.memberJoinGolf} onChange={(e) => setFormData({...formData, memberJoinGolf: e.target.checked})} className="custom-checkbox rounded text-emerald-600" />
                                        <span className="font-medium text-slate-700">⛳ 會員本人參加高爾夫球</span>
                                    </label>
                                )}
                            </div>
                            {formData.intent !== '無法參加' && (
                                <div className="space-y-4">
                                    <div className="flex items-center gap-4">
                                        <h4 className="font-medium text-slate-800 border-l-4 border-emerald-500 pl-2">攜伴資料 ({formData.guests.length})</h4>
                                        <button type="button" onClick={() => setFormData({...formData, guests: [...formData.guests, { name: '', relationship: '配偶/伴侶', guestJoinGolf: false }]})} className="text-xs bg-emerald-100 text-emerald-700 px-3 py-1.5 rounded-lg flex items-center gap-1 font-medium"><Icons.Plus className="w-4 h-4" /> 新增攜伴</button>
                                    </div>
                                    {formData.guests.map((g, i) => (
                                        <div key={i} className="grid grid-cols-1 md:grid-cols-12 gap-3 p-4 border rounded-lg bg-slate-50 relative">
                                            <input type="text" value={g.name} onChange={(e) => { const newG = [...formData.guests]; newG[i].name = e.target.value; setFormData({...formData, guests: newG}); }} className="md:col-span-4 p-2 border rounded-lg text-sm" placeholder="姓名" />
                                            <select value={g.relationship} onChange={(e) => { const newG = [...formData.guests]; newG[i].relationship = e.target.value; setFormData({...formData, guests: newG}); }} className="md:col-span-3 p-2 border rounded-lg text-sm bg-white">
                                                <option value="配偶/伴侶">配偶/伴侶</option><option value="父母">父母</option><option value="子女">子女</option><option value="親友">親友</option>
                                            </select>
                                            <label className="md:col-span-4 flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={g.guestJoinGolf} onChange={(e) => { const newG = [...formData.guests]; newG[i].guestJoinGolf = e.target.checked; setFormData({...formData, guests: newG}); }} className="rounded text-emerald-600" /><span className="text-sm font-medium">⛳ 參加打球</span></label>
                                            <button type="button" onClick={() => { const newG = formData.guests.filter((_, idx) => idx !== i); setFormData({...formData, guests: newG}); }} className="md:col-span-1 text-red-500 flex justify-end"><Icons.Trash2 /></button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                        <div className="p-4 border-t bg-slate-50 flex justify-end gap-3">
                            <button onClick={onClose} className="px-4 py-2 bg-white border rounded-lg">取消</button>
                            <button onClick={() => { 
                                if (!formData.memberName.trim()) return alert("請輸入姓名");
                                if (formData.intent === '無法參加') { formData.memberJoinGolf = false; formData.guests = []; }
                                onSave(formData); 
                            }} className="px-4 py-2 bg-sky-600 text-white rounded-lg flex items-center gap-2"><Icons.Send className="w-4 h-4" /> 儲存變更</button>
                        </div>
                    </div>
                </div>
            );
        };

        const RegistrationForm = ({ onSubmit, isSubmitting }) => {
            const [formData, setFormData] = useState({ memberName: '', intent: '有意願參加', memberJoinGolf: false, guests: [] });
            const [showSuccess, setShowSuccess] = useState(false);
            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.memberName.trim()) return alert("請輸入姓名");
                if (formData.intent !== '無法參加') { for (const g of formData.guests) { if (!g.name.trim()) return alert("請輸入攜伴姓名"); } }
                else { formData.memberJoinGolf = false; formData.guests = []; }
                const success = await onSubmit(formData); if (success) setShowSuccess(true);
            };
            if (showSuccess) return (
                <div className="flex flex-col items-center justify-center p-8 bg-white rounded-xl shadow-lg mt-6 text-center animate-fade-in mx-4">
                    <Icons.CheckCircle className="w-20 h-20 text-emerald-500 mb-4" />
                    <h2 className="text-2xl font-bold text-slate-800 mb-2">問卷送出成功！</h2>
                    <p className="text-slate-600">感謝您的回覆，調查資料已傳送。</p>
                </div>
            );
            return (
                <form onSubmit={handleSubmit} className="bg-white rounded-xl shadow-lg p-4 md:p-8 mt-4 md:mt-0 mx-2 md:mx-0">
                    <h2 className="text-xl font-bold text-slate-800 mb-6 border-b pb-3 flex items-center gap-2"><Icons.UserPlus className="text-sky-600" /> 填寫參加意願</h2>
                    <div className="space-y-4 mb-8">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 p-4 border border-slate-200 rounded-xl bg-slate-50">
                            <div>
                                <label className="block text-xs font-medium text-slate-500 mb-1">會員姓名 *</label>
                                <input required type="text" value={formData.memberName} onChange={(e) => setFormData({...formData, memberName: e.target.value})} className="w-full p-3 border rounded-lg" placeholder="姓名" />
                            </div>
                            <div>
                                <label className="block text-xs font-medium text-slate-500 mb-1">參加意願 *</label>
                                <select value={formData.intent} onChange={(e) => setFormData({...formData, intent: e.target.value})} className="w-full p-3 border rounded-lg bg-white font-medium text-sky-800">
                                   <option value="有意願參加">✅ 有意願參加</option><option value="無法參加">❌ 無法參加</option>
                                </select>
                            </div>
                            {formData.intent !== '無法參加' && (
                                <div className="md:col-span-2 mt-2 border-t pt-4">
                                    <label className={`flex items-center gap-3 p-3 border rounded-lg cursor-pointer transition ${formData.memberJoinGolf ? 'border-emerald-400 bg-emerald-50' : 'bg-white border-slate-300'}`}>
                                        <input type="checkbox" checked={formData.memberJoinGolf} onChange={(e) => setFormData({...formData, memberJoinGolf: e.target.checked})} className="custom-checkbox text-emerald-600" />
                                        <span className="font-medium text-slate-700">⛳ 我要額外參加高爾夫球活動</span>
                                    </label>
                                </div>
                            )}
                        </div>
                    </div>
                    {formData.intent !== '無法參加' && (
                        <div className="space-y-4 mb-8 fade-in">
                            <div className="flex items-center gap-4">
                                <h3 className="font-medium text-slate-800 bg-slate-100 p-3 rounded-lg flex items-center gap-2">攜伴人數 ({formData.guests.length})</h3>
                                <button type="button" onClick={() => setFormData({...formData, guests: [...formData.guests, { name: '', relationship: '配偶/伴侶', guestJoinGolf: false }]})} className="bg-emerald-500 text-white px-4 py-2 rounded-lg flex items-center gap-2"><Icons.Plus className="w-5 h-5" /> 新增攜伴</button>
                            </div>
                            {formData.guests.map((g, i) => (
                                <div key={i} className="grid grid-cols-1 md:grid-cols-12 gap-4 p-4 border rounded-xl bg-slate-50 items-center">
                                    <input required type="text" value={g.name} onChange={(e) => { const newG = [...formData.guests]; newG[i].name = e.target.value; setFormData({...formData, guests: newG}); }} className="md:col-span-4 p-3 border rounded-lg" placeholder="姓名" />
                                    <select value={g.relationship} onChange={(e) => { const newG = [...formData.guests]; newG[i].relationship = e.target.value; setFormData({...formData, guests: newG}); }} className="md:col-span-3 p-3 border rounded-lg bg-white">
                                        <option value="配偶/伴侶">配偶/伴侶</option><option value="父母">父母</option><option value="子女">子女</option><option value="親友">親友</option>
                                    </select>
                                    <label className="md:col-span-3 flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={g.guestJoinGolf} onChange={(e) => { const newG = [...formData.guests]; newG[i].guestJoinGolf = e.target.checked; setFormData({...formData, guests: newG}); }} className="custom-checkbox text-emerald-600" /><span className="text-sm font-medium">⛳ 參加打球</span></label>
                                    <button type="button" onClick={() => { const newG = formData.guests.filter((_, idx) => idx !== i); setFormData({...formData, guests: newG}); }} className="md:col-span-2 text-red-500 flex justify-end"><Icons.Trash2 /></button>
                                </div>
                            ))}
                        </div>
                    )}
                    <button type="submit" disabled={isSubmitting} className={`w-full py-4 rounded-xl font-bold text-lg text-white shadow-lg flex justify-center items-center gap-2 ${isSubmitting ? 'bg-slate-400' : 'bg-gradient-to-r from-sky-600 to-sky-700 hover:from-sky-700'}`}>
                        {isSubmitting ? '傳送中...' : <><Icons.Send className="w-6 h-6" /> 送出意願表</>}
                    </button>
                </form>
            );
        };

        const AdminDashboard = ({ registrations, onLogout, onAction }) => {
            const [editingDoc, setEditingDoc] = useState(null);
            const interestedRegs = registrations.filter(r => r.intent !== '無法參加');
            const totalMembers = interestedRegs.length;
            const totalGuests = interestedRegs.reduce((acc, curr) => acc + (curr.guests?.length || 0), 0);
            const totalPeople = totalMembers + totalGuests;
            let totalGolfers = 0;
            interestedRegs.forEach(reg => { if (reg.memberJoinGolf) totalGolfers++; (reg.guests||[]).forEach(g => { if (g.guestJoinGolf) totalGolfers++; }); });

            const exportToCSV = () => {
                let csvContent = "\uFEFF填寫時間,身分,姓名,參加意願,參加高爾夫球,攜伴資料,對應會員\n";
                registrations.forEach(reg => {
                    const date = new Date(reg.timestamp || Date.now()).toLocaleString();
                    const intentStr = reg.intent === '有意願參加' ? '參加' : '不參加';
                    const mGolfStr = (reg.intent !== '無法參加' && reg.memberJoinGolf) ? '⛳ 參與' : '';
                    csvContent += `"${date}","會員本人","${reg.memberName}","${intentStr}","${mGolfStr}","-","-"\n`;
                    if (reg.intent !== '無法參加' && reg.guests) {
                        reg.guests.forEach(g => {
                            const gGolfStr = g.guestJoinGolf ? '⛳ 參與' : '';
                            csvContent += `"${date}","攜伴","${g.name}","${intentStr}","${gGolfStr}","${g.relationship}","${reg.memberName}"\n`;
                        });
                    }
                });
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `紐西蘭意願調查_${new Date().toISOString().slice(0,10)}.csv`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            return (
                <div className="mt-6">
                    <div className="bg-white p-4 rounded-xl shadow-sm border mx-2 md:mx-0 flex flex-col md:flex-row justify-between gap-4">
                        <div>
                            <h2 className="text-xl font-bold flex items-center gap-2"><Icons.Users className="text-sky-600" /> 調查結果統計</h2>
                            <div className="flex flex-wrap gap-3 mt-3 text-sm text-slate-600 bg-slate-50 p-3 rounded-lg border">
                                <span>預計總人數: <b className="text-sky-700 text-lg">{totalPeople}</b> 人</span>
                                <span className="border-l pl-3">參加高爾夫球: <b className="text-emerald-600 text-lg">{totalGolfers}</b> 人</span>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={exportToCSV} className="bg-sky-600 text-white px-4 py-2 rounded-lg flex items-center gap-2 text-sm shadow-sm"><Icons.Download className="w-4 h-4" /> 匯出 CSV</button>
                            <button onClick={onLogout} className="bg-slate-100 text-slate-700 px-4 py-2 rounded-lg flex items-center gap-2 text-sm border hover:bg-slate-200"><Icons.LogOut className="w-4 h-4" /> 登出</button>
                        </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-md overflow-hidden border mt-4 mx-2 md:mx-0">
                        <div className="overflow-x-auto">
                            <table className="min-w-full divide-y divide-slate-200">
                                <thead className="bg-slate-50 text-xs font-bold text-slate-500 uppercase tracking-wider">
                                    <tr><th className="px-4 py-3 text-left">操作</th><th className="px-4 py-3 text-left">身分</th><th className="px-4 py-3 text-left">姓名</th><th className="px-4 py-3 text-left">參加意願</th><th className="px-4 py-3 text-left">高爾夫球</th><th className="px-4 py-3 text-left">攜伴資料</th></tr>
                                </thead>
                                <tbody className="bg-white divide-y divide-slate-200">
                                    {registrations.flatMap((reg) => {
                                        const isNo = reg.intent === '無法參加';
                                        const displayIntent = isNo ? '不參加' : '參加';
                                        const memberRow = (
                                            <tr key={reg.userId} className={`hover:bg-sky-50/30 ${isNo ? 'opacity-70 bg-slate-50' : ''} border-t-2 border-slate-100`}>
                                                <td className="px-4 py-3 flex gap-2">
                                                    <button onClick={() => setEditingDoc(reg)} className="p-2 bg-sky-50 text-sky-600 rounded-lg hover:bg-sky-100"><Icons.Edit className="w-4 h-4" /></button>
                                                    <button onClick={() => { if(confirm(`確定刪除 ${reg.memberName}？`)) onAction('delete', {userId: reg.userId}); }} className="p-2 bg-red-50 text-red-500 rounded-lg hover:bg-red-100"><Icons.Trash2 className="w-4 h-4" /></button>
                                                </td>
                                                <td className="px-4 py-3 whitespace-nowrap"><span className="bg-sky-100 text-sky-800 text-xs px-2 py-1 rounded">會員本人</span></td>
                                                <td className="px-4 py-3 whitespace-nowrap font-bold text-slate-800">{reg.memberName}</td>
                                                <td className="px-4 py-3 whitespace-nowrap"><span className={`text-xs px-2 py-0.5 rounded-full ${isNo ? 'bg-rose-100 text-rose-700' : 'bg-emerald-100 text-emerald-700'}`}>{displayIntent}</span></td>
                                                <td className="px-4 py-3 text-emerald-600 font-bold">{!isNo && reg.memberJoinGolf ? '⛳ 參與' : ''}</td>
                                                <td className="px-4 py-3 text-slate-400 text-sm">-</td>
                                            </tr>
                                        );
                                        const guestRows = (!isNo && reg.guests) ? reg.guests.map((g, i) => (
                                            <tr key={`${reg.userId}-g-${i}`} className="hover:bg-sky-50/30 bg-slate-50/50">
                                                <td className="px-4 py-3 border-l-4 border-sky-300"></td>
                                                <td className="px-4 py-3 whitespace-nowrap"><span className="bg-slate-200 text-slate-600 text-xs px-2 py-1 rounded">攜伴</span></td>
                                                <td className="px-4 py-3 whitespace-nowrap text-slate-700">{g.name}</td>
                                                <td className="px-4 py-3 whitespace-nowrap"><span className="text-xs px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-600/70">參加</span></td>
                                                <td className="px-4 py-3 text-emerald-600 font-bold">{g.guestJoinGolf ? '⛳ 參與' : ''}</td>
                                                <td className="px-4 py-3 text-slate-600 text-sm">{g.relationship}</td>
                                            </tr>
                                        )) : [];
                                        return [memberRow, ...guestRows];
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    {editingDoc && <EditModal data={editingDoc} onClose={() => setEditingDoc(null)} onSave={(d) => { onAction('update', d); setEditingDoc(null); }} />}
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('form');
            const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);
            const [registrations, setRegistrations] = useState([]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [refreshKey, setRefreshKey] = useState(0);
            const [showItineraryModal, setShowItineraryModal] = useState(false);

            useEffect(() => {
                if (view === 'admin' && isAdminLoggedIn) {
                    fetch(GOOGLE_SCRIPT_URL).then(res => res.json()).then(data => setRegistrations(data.reverse())).catch(err => console.error(err));
                }
            }, [view, isAdminLoggedIn, refreshKey]);

            const sendToGAS = async (payload) => {
                setIsSubmitting(true);
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload), headers: { "Content-Type": "text/plain;charset=utf-8" } });
                    setIsSubmitting(false); return true;
                } catch (e) { alert("失敗"); setIsSubmitting(false); return false; }
            };

            const handleAdminAction = async (action, data) => {
                const success = await sendToGAS({ ...data, action: action });
                if (success) { setRefreshKey(prev => prev + 1); }
            };

            return (
                <div className="flex-grow flex flex-col">
                    <Header setView={setView} view={view} />
                    {showItineraryModal && <ItineraryModal onClose={() => setShowItineraryModal(false)} />}
                    <main className="max-w-4xl mx-auto w-full px-0 md:px-4 flex-grow">
                        {view === 'form' && (
                            <div className="animate-fade-in px-4">
                                <div className="mt-8 text-center mb-6">
                                    <h2 className="text-sky-600 font-bold mb-1 tracking-widest">桃園市結構工程技師公會</h2>
                                    <h1 className="text-2xl md:text-4xl font-extrabold text-slate-800">2026 紐西蘭參訪暨高爾夫球聯誼活動</h1>
                                </div>
                                <div className="rounded-2xl overflow-hidden shadow-lg mb-6"><img src="NewZealand.jpg" className="w-full h-auto block" /></div>
                                <div className="bg-sky-50 border border-sky-100 rounded-xl p-5 mb-4 text-slate-700 shadow-sm text-sm md:text-base">
                                    <h3 className="font-bold text-lg text-sky-800 border-b border-sky-200 pb-2 mb-3">📌 活動規劃概要</h3>
                                    <p className="mb-2"><strong>預計時間：</strong>2026年12月 (11天9夜)</p>
                                    <p className="mb-2"><strong>活動說明：</strong>本階段為意願調查，將根據人數規劃報價。<b>此次行程為團體活動，需全員搭乘同一航班，團進團出。</b></p>
                                    <p><strong>填寫期限：</strong>請於 <b className="text-red-600">2026/4/15 PM 11:59</b> 前回覆。</p>
                                </div>
                                <div className="bg-white border rounded-xl p-5 mb-6 shadow-sm">
                                    <div className="flex justify-between items-center border-b pb-3 mb-4">
                                        <h3 className="font-bold flex items-center gap-2"><Icons.FileText className="text-sky-600"/> 參考行程表 (暫定版)</h3>
                                        <a href={ITINERARY_PDF_URL} target="_blank" className="text-xs bg-sky-50 text-sky-700 border border-sky-200 px-3 py-1.5 rounded-lg flex items-center gap-1.5 transition font-medium"><Icons.Download className="w-3 h-3"/> PDF版</a>
                                    </div>
                                    <div className="flex overflow-x-auto gap-3 pb-2 no-scrollbar snap-x">
                                        {ITINERARY_IMAGES.map((src, idx) => (
                                            <div key={idx} onClick={() => setShowItineraryModal(true)} className="relative flex-none w-32 md:w-40 aspect-[3/4] rounded-lg overflow-hidden cursor-pointer border shadow-sm group">
                                                <img src={src} className="w-full h-full object-cover group-hover:scale-105 transition duration-300" />
                                                <div className="absolute inset-0 bg-black/0 group-hover:bg-black/10 flex items-center justify-center transition"><Icons.Search className="text-white opacity-0 group-hover:opacity-100" /></div>
                                                <div className="absolute bottom-0 left-0 right-0 bg-black/60 p-1 text-white text-[10px] text-center">第 {idx + 1} 頁</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <RegistrationForm onSubmit={(d) => sendToGAS({ ...d, action: 'add', userId: 'ID_' + Date.now(), timestamp: new Date().toISOString() })} isSubmitting={isSubmitting} />
                            </div>
                        )}
                        {view === 'admin' && (isAdminLoggedIn ? <AdminDashboard registrations={registrations} onLogout={() => setIsAdminLoggedIn(false)} onAction={handleAdminAction} /> : <AdminLogin onLogin={setIsAdminLoggedIn} />)}
                    </main>
                    <footer className="mt-12 py-6 text-center text-slate-400 text-sm bg-slate-100 border-t border-slate-200">&copy; 2026 桃園市結構工程技師公會 by 曉芬</footer>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
